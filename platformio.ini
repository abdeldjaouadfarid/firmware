[env:heltec_wireless_tracker]
platform     = espressif32
; heltec_wireless_tracker is not in the standard board list.
; heltec_wifi_lora_32_V3 is the same MCU (ESP32-S3, 8 MB flash) — safe substitute
; since all pins are defined explicitly in main.cpp.
board        = heltec_wifi_lora_32_V3
framework    = arduino
monitor_speed = 115200
upload_speed  = 921600
upload_port   = COM4
monitor_port  = COM4

; ESP32-S3 routes USB straight to the chip's native USB-Serial/JTAG.
; ARDUINO_USB_MODE=1 is already set by the board; this maps Serial onto
; that USB port so serial-monitor output is actually visible.
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    mikalhart/TinyGPSPlus@^1.0.3
    bblanchon/ArduinoJson@^7.0.0
